<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto - Blessed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        purple: {
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                        },
                        dark: {
                            900: '#0a0a0a',
                            800: '#1a1a1a',
                            700: '#2d2d2d',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }
        .glass {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .size-btn.active {
            background: #7c3aed;
            border-color: #7c3aed;
            color: white;
        }
        .thumb {
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .thumb.active, .thumb:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen">
    <nav class="fixed w-full z-50 glass border-b border-purple-600/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-purple-700 rounded-lg flex items-center justify-center">
                        <i data-lucide="shirt" class="w-6 h-6 text-white"></i>
                    </div>
                    <span class="text-2xl font-serif font-bold gradient-text">Blessed</span>
                </a>
                <a href="carrito.html" class="p-2 hover:bg-purple-600/20 rounded-lg transition-colors relative">
                    <i data-lucide="shopping-bag" class="w-5 h-5 text-gray-300"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-purple-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="pt-28 pb-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <a href="productos.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-purple-400 transition-colors mb-6">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Volver a la tienda
            </a>

            <div id="product-detail" class="grid lg:grid-cols-2 gap-12">
                <!-- Content loaded by JS -->
            </div>

            <!-- Related Products -->
            <div class="mt-20">
                <h2 class="text-2xl font-serif font-bold mb-8">Productos <span class="gradient-text">Relacionados</span></h2>
                <div id="related-products" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                    <!-- Loaded by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="glass px-6 py-4 rounded-xl flex items-center gap-3 border border-purple-600/30 shadow-2xl">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-400"></i>
            <span id="toast-message" class="text-white font-medium"></span>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        
        let currentProduct = null;
        let selectedSize = null;
        let quantity = 1;

        document.addEventListener('DOMContentLoaded', function() {
            loadProductDetail();
            updateCartCount();
        });

        function loadProductDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));
            
            const products = JSON.parse(localStorage.getItem('products')) || getDefaultProducts();
            currentProduct = products.find(p => p.id === productId);
            
            if (!currentProduct) {
                window.location.href = 'productos.html';
                return;
            }
            
            renderProductDetail(currentProduct);
            loadRelatedProducts(products, currentProduct);
        }

        function renderProductDetail(product) {
            const container = document.getElementById('product-detail');
            const mainImage = Array.isArray(product.images) ? product.images[0] : product.image;
            
            container.innerHTML = `
                <div class="space-y-4">
                    <div class="aspect-[3/4] rounded-2xl overflow-hidden border border-purple-600/20">
                        <img id="main-image" src="${mainImage}" alt="${product.name}" class="w-full h-full object-cover">
                    </div>
                    ${product.images && product.images.length > 1 ? `
                        <div class="grid grid-cols-4 gap-2">
                            ${product.images.map((img, idx) => `
                                <button class="thumb ${idx === 0 ? 'active' : ''} aspect-square rounded-lg overflow-hidden border-2 ${idx === 0 ? 'border-purple-600' : 'border-transparent'} hover:border-purple-600 transition-colors" onclick="changeImage('${img}', this)">
                                    <img src="${img}" class="w-full h-full object-cover">
                                </button>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>

                <div class="space-y-6">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="px-3 py-1 bg-purple-600/20 text-purple-400 text-xs rounded-full">${product.category}</span>
                            <div class="flex items-center gap-1">
                                <i data-lucide="star" class="w-4 h-4 text-yellow-400 fill-yellow-400"></i>
                                <span class="text-sm text-gray-400">${product.rating || 4.5} (${product.reviews || 0} reseñas)</span>
                            </div>
                        </div>
                        <h1 class="text-3xl md:text-4xl font-serif font-bold mb-2">${product.name}</h1>
                        <p class="text-gray-400 leading-relaxed">${product.description}</p>
                    </div>

                    <div class="flex items-baseline gap-3">
                        <span class="text-4xl font-bold text-purple-400">$${product.price}</span>
                        ${product.originalPrice ? `<span class="text-xl text-gray-500 line-through">$${product.originalPrice}</span>` : ''}
                    </div>

                    <div class="border-t border-b border-purple-600/20 py-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-3">Talla</label>
                            <div class="flex flex-wrap gap-2">
                                ${(product.sizes || ['S', 'M', 'L', 'XL']).map(size => `
                                    <button onclick="selectSize('${size}')" class="size-btn w-12 h-12 rounded-lg border border-purple-600/30 hover:border-purple-500 transition-all font-medium" data-size="${size}">
                                        ${size}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-3">Cantidad</label>
                            <div class="flex items-center gap-4">
                                <button onclick="updateQuantity(-1)" class="w-10 h-10 rounded-lg border border-purple-600/30 hover:bg-purple-600/20 flex items-center justify-center transition-colors">
                                    <i data-lucide="minus" class="w-4 h-4"></i>
                                </button>
                                <span id="quantity-display" class="text-xl font-semibold w-8 text-center">1</span>
                                <button onclick="updateQuantity(1)" class="w-10 h-10 rounded-lg border border-purple-600/30 hover:bg-purple-600/20 flex items-center justify-center transition-colors">
                                    <i data-lucide="plus" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <button onclick="addToCartWithOptions()" class="flex-1 py-4 bg-purple-600 hover:bg-purple-500 rounded-xl font-semibold text-white transition-all transform hover:scale-[1.02] flex items-center justify-center gap-2">
                            <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                            Agregar al Carrito
                        </button>
                        <button onclick="buyNow()" class="px-6 py-4 border border-purple-600/50 hover:bg-purple-600/10 rounded-xl font-semibold transition-all">
                            Comprar Ahora
                        </button>
                    </div>

                    <div class="grid grid-cols-3 gap-4 pt-4">
                        <div class="text-center p-4 rounded-xl bg-purple-600/10">
                            <i data-lucide="truck" class="w-6 h-6 mx-auto mb-2 text-purple-400"></i>
                            <p class="text-xs text-gray-400">Envío gratis</p>
                        </div>
                        <div class="text-center p-4 rounded-xl bg-purple-600/10">
                            <i data-lucide="refresh-cw" class="w-6 h-6 mx-auto mb-2 text-purple-400"></i>
                            <p class="text-xs text-gray-400">Devolución 30 días</p>
                        </div>
                        <div class="text-center p-4 rounded-xl bg-purple-600/10">
                            <i data-lucide="shield-check" class="w-6 h-6 mx-auto mb-2 text-purple-400"></i>
                            <p class="text-xs text-gray-400">Garantía</p>
                        </div>
                    </div>
                </div>
            `;
            
            lucide.createIcons();
        }

        function changeImage(src, thumb) {
            document.getElementById('main-image').src = src;
            document.querySelectorAll('.thumb').forEach(t => {
                t.classList.remove('active');
                t.classList.remove('border-purple-600');
                t.classList.add('border-transparent');
            });
            thumb.classList.add('active');
            thumb.classList.remove('border-transparent');
            thumb.classList.add('border-purple-600');
        }

        function selectSize(size) {
            selectedSize = size;
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-size="${size}"]`).classList.add('active');
        }

        function updateQuantity(change) {
            quantity += change;
            if (quantity < 1) quantity = 1;
            document.getElementById('quantity-display').textContent = quantity;
        }

        function addToCartWithOptions() {
            if (!selectedSize) {
                showToast('Por favor selecciona una talla');
                return;
            }
            addToCart(currentProduct.id, quantity, selectedSize);
            showToast('Producto agregado al carrito');
        }

        function buyNow() {
            if (!selectedSize) {
                showToast('Por favor selecciona una talla');
                return;
            }
            addToCart(currentProduct.id, quantity, selectedSize);
            window.location.href = 'carrito.html';
        }

        function loadRelatedProducts(allProducts, current) {
            const related = allProducts
                .filter(p => p.category === current.category && p.id !== current.id)
                .slice(0, 4);
            
            const container = document.getElementById('related-products');
            container.innerHTML = related.map(product => `
                <a href="producto-detail.html?id=${product.id}" class="glass rounded-xl overflow-hidden border border-purple-600/20 group">
                    <div class="aspect-[3/4] overflow-hidden">
                        <img src="${product.image}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" alt="${product.name}">
                    </div>
                    <div class="p-4">
                        <h3 class="font-semibold text-white line-clamp-1 mb-1">${product.name}</h3>
                        <p class="text-purple-400 font-bold">$${product.price}</p>
                    </div>
                </a>
            `).join('');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            toastMessage.textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
